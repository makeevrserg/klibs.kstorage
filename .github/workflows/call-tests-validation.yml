name: "Tests"
on:
  workflow_call:

jobs:
  tests:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: "ubuntu-latest"
            task: "jsBrowserTest jsNodeTest jsTest jvmTest linuxX64Test mingwX64Test wasmJsBrowserTest wasmJsTest"
          - platform: "macos-latest"
            task: "iosSimulatorArm64Test iosX64Test macosArm64Test macosX64Test tvosSimulatorArm64Test tvosX64Test watchosSimulatorArm64Test watchosX64Test"
    name: "Run tests"
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v6
      - name: Set up JDK 1.17
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '17'
      - name: Give gradle permission
        run: chmod +x gradlew
      - name: Run tests
        uses: gradle/gradle-build-action@v3
        with:
          arguments: ${{ matrix.task }} --stacktrace